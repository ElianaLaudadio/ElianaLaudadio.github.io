<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Training Dashboard 💪</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link
    href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --bg: #f5f4f2;
      --fg: #111111;
      --muted: #555555;
      --card-bg: #ffffff;
      --hover: #ece9e6;
      --border: #111111;
      --accent: #000000;
      --btn-bg: #333333;
      --btn-hover: #555555;
      --note-indicator: #111111;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Atkinson Hyperlegible', sans-serif;
      background-color: var(--bg);
      color: var(--fg);
      padding-top: 80px;
      padding-bottom: 60px;
    }

    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: var(--bg);
      border-bottom: 2px solid var(--border);
      padding: 20px 0;
      text-align: center;
      z-index: 1000;
    }

    nav a {
      color: var(--fg);
      text-decoration: none;
      margin: 0 20px;
      font-weight: 600;
      font-size: 16px;
      position: relative;
      font-family: 'Atkinson Hyperlegible', sans-serif;
    }

    nav a::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 0;
      width: 0%;
      height: 2px;
      background: var(--accent);
      transition: width 0.3s ease;
    }

    nav a:hover::after { width: 100%; }

    #hamburger {
      display: none;
      font-size: 36px;
      cursor: pointer;
      color: var(--fg);
      margin: 0 auto;
    }

    #mobile-menu {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      width: 100%;
      background: var(--bg);
      border-top: 2px solid var(--border);
      flex-direction: column;
      padding: 16px 0;
      text-align: center;
    }

    #mobile-menu a {
      display: block;
      padding: 14px 0;
      font-size: 18px;
    }

    #go-to-cart {
      text-align: center;
      background: var(--card-bg);
      padding: 28px;
      border-radius: 18px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      max-width: 640px;
      margin: 20px auto 40px auto;
      border: 2px solid var(--border);
    }

    #go-to-cart h3 {
      margin: 0;
      font-size: 28px;
      font-weight: 500;
      font-family: 'Atkinson Hyperlegible', sans-serif;
    }

    #go-to-cart button {
      background-color: var(--btn-bg);
      color: var(--bg);
      border: none;
      padding: 14px 28px;
      font-size: 18px;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s ease;
      margin-top: 12px;
      font-weight: 500;
      font-family: 'Atkinson Hyperlegible', sans-serif;
    }

    #go-to-cart button:hover { background-color: var(--btn-hover); }

    section {
      max-width: 720px;
      margin: 0 auto 40px;
      padding: 0 20px;
    }

    .section-title {
      font-family: 'Atkinson Hyperlegible', sans-serif;
      font-size: 32px;
      text-align: center;
      margin-bottom: 30px;
    }

    .tabs {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .tab-button {
      padding: 10px 20px;
      border-radius: 8px;
      background: var(--card-bg);
      border: 2px solid var(--border);
      cursor: pointer;
      font-weight: 600;
      transition: background 0.3s ease;
      font-family: 'Atkinson Hyperlegible', sans-serif;
    }

    .tab-button.active {
      background: var(--accent);
      color: var(--bg);
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .card {
      background: var(--card-bg);
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .card:hover {
      transform: translateY(-6px);
      background: var(--hover);
    }

    .card h3 {
      margin: 0 0 6px;
      font-size: 20px;
      font-family: 'Atkinson Hyperlegible', sans-serif;
      text-transform: capitalize;
    }

    .card p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

  </style>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/myfolder/js/auth.js?v=5"></script>
</head>

<body>

  <!-- NAV UNCHANGED -->
  <nav>
    <a href="/myfolder/index.html">Home</a>
    <a href="/myfolder/template.html">Goals + Progress</a>
    <a href="/myfolder/workouts.html">Workouts</a>
    <a href="/myfolder/meal_planner.html">Meal Planner</a>
    <a href="/myfolder/cart.html">Grocery List</a>
  </nav>

  <section>
    <h2 class="section-title">Featured Meals</h2>

    <div class="tabs">
      <div class="tab-button active" data-tab="breakfast">Breakfast</div>
      <div class="tab-button" data-tab="lunch">Lunch + Dinner</div>
      <div class="tab-button" data-tab="snacks">Snacks</div>
      <div class="tab-button" data-tab="mymeals">My Meals</div>
    </div>

    <div class="cards" id="breakfast-cards"></div>
    <div class="cards" id="lunch-cards" style="display:none;"></div>
    <div class="cards" id="snacks-cards" style="display:none;"></div>
    <div class="cards" id="mymeals-cards" style="display:none;"></div>
  </section>

<script>
const breakfast = [
  { title: "Protein Cereal", ingredients: ["Kashi - Go Cereal", "Milk"] }
];

const lunch = [
  { title: "Burrito Bowl", ingredients: ["Choice of Protein", "Rice"] }
];

const snacks = [
  { title: "Deviled Eggs", ingredients: ["Eggs", "Mayonnaise"] }
];

const mymeals = [
  { title: "Custom Meal 1", ingredients: ["Ingredient 1", "Ingredient 2"] },
  { title: "Custom Meal 2", ingredients: ["Ingredient A", "Ingredient B"] }
];

function renderCards(items, containerId) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';

  items.forEach(item => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<h3>${item.title}</h3><p>Click to view ingredients</p>`;
    container.appendChild(card);
  });
}

renderCards(breakfast, 'breakfast-cards');
renderCards(lunch, 'lunch-cards');
renderCards(snacks, 'snacks-cards');
renderCards(mymeals, 'mymeals-cards');

const tabButtons = document.querySelectorAll('.tab-button');
tabButtons.forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelector('.tab-button.active').classList.remove('active');
    btn.classList.add('active');

    document.getElementById('breakfast-cards').style.display = 'none';
    document.getElementById('lunch-cards').style.display = 'none';
    document.getElementById('snacks-cards').style.display = 'none';
    document.getElementById('mymeals-cards').style.display = 'none';

    document.getElementById(btn.dataset.tab + '-cards').style.display = 'flex';
  });
});
</script>

</body>
</html>
